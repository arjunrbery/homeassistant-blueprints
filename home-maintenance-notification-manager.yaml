blueprint:
  name: Home Maintenance Notification Manager
  description: Generic notification system with weekly/monthly triggers, manual reset, and optional alerts.
  domain: automation
  input:
    # --- Trigger Section ---
    trigger_section:
      name: Trigger Settings
      icon: mdi:clock-start
      input:
        input_datetime_entity:
          name: Input Datetime Entity
          selector:
            entity:
              domain: input_datetime
        trigger_time:
          name: Trigger Time
          default: "17:00:00"
          selector:
            time:
        trigger_frequency:
          name: Trigger Frequency
          default: weekly
          selector:
            select:
              options:
                - label: Weekly
                  value: weekly
                - label: Monthly
                  value: monthly
        trigger_weekday:
          name: Trigger Weekday (Weekly)
          default: mon
          selector:
            select:
              options: [mon, tue, wed, thu, fri, sat, sun]
        trigger_day_of_month:
          name: Trigger Day of Month (Monthly)
          default: 1
          selector:
            number:
              min: 1
              max: 28
              unit_of_measurement: day
        notification_window_hours:
          name: Notification Window (Hours)
          default: 5
          selector:
            number:
              min: 0
              max: 72
              unit_of_measurement: hours
        notification_title:
          name: Notification Title
          default: Maintenance Alert
          selector:
            text:
        notification_message:
          name: Notification Message
          default: Time to perform maintenance on {{ device }}.
          selector:
            text:

    # --- Clearance Section ---
    clearance_section:
      name: Clearance Settings
      icon: mdi:check-circle
      input:
        enable_auto_clear:
          name: Enable Auto-Clear
          default: true
          selector:
            boolean:
        clear_time:
          name: Clear Time
          default: "05:00:00"
          selector:
            time:
        clear_weekday:
          name: Clear Weekday
          default: tue
          selector:
            select:
              options: [mon, tue, wed, thu, fri, sat, sun]

    # --- Missed Section ---
    missed_section:
      name: Missed Alert Settings
      icon: mdi:alert-circle
      input:
        enable_missed_alert:
          name: Enable Missed Alert
          default: true
          selector:
            boolean:
        missed_alert_window_hours:
          name: Missed Alert Window (Hours)
          default: 24
          selector:
            number:
              min: 1
              max: 168
              unit_of_measurement: hours
        missed_title:
          name: Missed Alert Title
          default: Maintenance Missed
          selector:
            text:
        missed_message:
          name: Missed Alert Message
          default: Maintenance for {{ device }} was not completed.
          selector:
            text:
        notify_service:
          name: Notification Service
          selector:
            service:
              domain: notify

    # --- Manual Reset Section ---
    reset_section:
      name: Manual Reset Settings
      icon: mdi:restart
      input:
        reset_button_entity:
          name: Reset Button Entity
          default: []
          selector:
            target:
              entity:
                domain: [button, input_button]
        reset_tag_id:
          name: Reset Tag ID
          default: ""
          selector:
            text:

variables:
  _entity: !input input_datetime_entity
  _window: !input notification_window_hours
  _enable_missed: !input enable_missed_alert
  _enable_clear: !input enable_auto_clear
  _missed_window: !input missed_alert_window_hours
  _notify_service: !input notify_service
  _device: states[_entity].attributes.friendly_name | default("Device")
  _reset_button: !input reset_button_entity
  _reset_tag_id: !input reset_tag_id

trigger:
  - platform: time
    at: !input trigger_time
  - platform: time
    at: !input clear_time
    enabled: !input enable_auto_clear
  - platform: state
    entity_id: !input input_datetime_entity
  - platform: device
    type: turned_on
    device_id: "{{ device_id(_reset_button) }}"
    domain: input_button
    enabled: "{{ _reset_button | length > 0 }}"
  - platform: device
    type: turned_on
    device_id: "{{ device_id(_reset_button) }}"
    domain: button
    enabled: "{{ _reset_button | length > 0 }}"
  - platform: tag
    tag_id: !input reset_tag_id
    enabled: "{{ _reset_tag_id != '' }}"

condition:
  - condition: template
    value_template: >
      {% set freq = input_datetime.trigger_frequency %}
      {% if freq == 'weekly' %}
        {{ now().weekday() == ['mon','tue','wed','thu','fri','sat','sun'].index(input_datetime.trigger_weekday) }}
      {% elif freq == 'monthly' %}
        {{ now().day == input_datetime.trigger_day_of_month }}
      {% endif %}

action:
  - choose:
      - conditions:
          - condition: trigger
            platform: time
          - condition: template
            value_template: >
              {{ trigger.now.hour == (strptime(input_datetime.trigger_time, '%H:%M:%S').time().hour) and
                 trigger.now.minute == (strptime(input_datetime.trigger_time, '%H:%M:%S').time().minute) }}
          - condition: template
            value_template: >
              {{ (now().timestamp() - states(_entity).attributes.timestamp) > (_window * 3600) }}
        sequence:
          - service: "{{ _notify_service }}"
            data:
              title: "{{ !input notification_title }}"
              message: "{{ !input notification_message }}"
              data:
                push:
                  interruption-level: critical
                  sound:
                    name: default
                    critical: 1
                    volume: 0
                sticky: true
                tag: "{{ _device | lower | replace(' ', '_') }}_maintenance"

      - conditions:
          - condition: trigger
            platform: time
          - condition: template
            value_template: >
              {{ trigger.now.hour == (strptime(input_datetime.clear_time, '%H:%M:%S').time().hour) and
                 trigger.now.minute == (strptime(input_datetime.clear_time, '%H:%M:%S').time().minute) }}
          - condition: template
            value_template: "{{ _enable_missed }}"
          - condition: template
            value_template: >
              {{ (now().timestamp() - states(_entity).attributes.timestamp) > (_missed_window * 3600) }}
        sequence:
          - service: "{{ _notify_service }}"
            data:
              title: "{{ !input missed_title }}"
              message: "{{ !input missed_message }}"

      - conditions:
          - condition: template
            value_template: >
              {{ (trigger.platform == 'time' and trigger.id == 'time_1') or
                 trigger.entity_id == _entity or
                 (trigger.platform == 'device' and _reset_button | length > 0) or
                 (trigger.platform == 'tag' and _reset_tag_id != '') }}
        sequence:
          - service: "{{ _notify_service }}"
            data:
              message: clear_notification
              data:
                tag: "{{ _device | lower | replace(' ', '_') }}_maintenance"

    default: []
mode: single   
