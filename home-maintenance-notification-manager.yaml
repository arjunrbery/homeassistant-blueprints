blueprint:
  name: Home Maintenance Notification Manager
  description: Generic notification system for home maintenance tasks with configurable triggers, clearance, and missed alerts.
  domain: automation
  input:
    # --- Trigger Section ---
    device:
      name: Device Name
      default: Device
      selector:
        text:
    trigger_time:
      name: Trigger Time
      default: "17:00:00"
      selector:
        time:
    trigger_weekday:
      name: Trigger Weekday
      default: mon
      selector:
        select:
          options: [mon, tue, wed, thu, fri, sat, sun]
    input_datetime_entity:
      name: Input Datetime Entity
      selector:
        entity:
          domain: input_datetime
    notification_window_hours:
      name: Notification Window (Hours)
      default: 5
      selector:
        number:
          min: 0
          max: 72
          unit_of_measurement: hours
    notification_title:
      name: Notification Title
      default: Maintenance Alert
      selector:
        text:
    notification_message:
      name: Notification Message
      default: Time to perform maintenance on {{ device }}.
      selector:
        text:
    notify_service:
      name: Notification Service
      default: notify.mobile_app_phone
      selector:
        text:

    # --- Clearance Section ---
    enable_auto_clear:
      name: Enable Auto-Clear
      default: true
      selector:
        boolean:
    clear_time:
      name: Clear Time
      default: "05:00:00"
      selector:
        time:
    clear_weekday:
      name: Clear Weekday
      default: tue
      selector:
        select:
          options: [mon, tue, wed, thu, fri, sat, sun]

    # --- Missed Section ---
    enable_missed_alert:
      name: Enable Missed Alert
      default: true
      selector:
        boolean:
    missed_title:
      name: Missed Alert Title
      default: Maintenance Missed
      selector:
        text:
    missed_message:
      name: Missed Alert Message
      default: Maintenance for {{ device }} was not completed.
      selector:
        text:

variables:
  _device: !input device
  _entity: !input input_datetime_entity
  _window: !input notification_window_hours
  _enable_missed: !input enable_missed_alert
  _enable_clear: !input enable_auto_clear

trigger:
  - platform: time
    at: !input trigger_time
    weekday:
      - !input trigger_weekday
  - platform: time
    at: !input clear_time
    weekday:
      - !input clear_weekday
    enabled: !input enable_auto_clear
  - platform: state
    entity_id: !input input_datetime_entity

action:
  - choose:
      # Send alert if not done within window
      - conditions:
          - condition: trigger
            platform: time
          - condition: time
            after: !input trigger_time
            before: >
              {{ (as_timestamp(now()) + 60) | timestamp_custom('%H:%M:%S') }}
          - condition: template
            value_template: >
              {{ (now().timestamp() - states(_entity).attributes.timestamp) > (_window * 3600) }}
        sequence:
          - service: !input notify_service
            data:
              title: "{{ !input notification_title }}"
              message: "{{ !input notification_message }}"
              data:
                push:
                  interruption-level: critical
                  sound:
                    name: default
                    critical: 1
                    volume: 0
                sticky: true
                tag: "{{ _device | lower }}_maintenance"

      # Send missed alert
      - conditions:
          - condition: trigger
            platform: time
          - condition: time
            after: !input clear_time
            before: >
              {{ (as_timestamp(now()) + 60) | timestamp_custom('%H:%M:%S') }}
          - condition: template
            value_template: "{{ _enable_missed }}"
          - condition: template
            value_template: >
              {{ (now().timestamp() - states(_entity).attributes.timestamp) > 86400 }}
        sequence:
          - service: !input notify_service
            data:
              title: "{{ !input missed_title }}"
              message: "{{ !input missed_message }}"

      # Clear notification
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.platform == 'time' or trigger.entity_id == _entity }}
        sequence:
          - service: !input notify_service
            data:
              message: clear_notification
              data:
                tag: "{{ _device | lower }}_maintenance"

    default: []
mode: single   
